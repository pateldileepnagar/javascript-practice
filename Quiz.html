<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Application</title>
    <link rel="stylesheet" href="Quiz.css">
</head>
<body>
    <header class="header">
        <h1>Quiz Application</h1>
        <p>Test your knowledge with 10 multiple-choice questions.</p>
    </header>

    <main class="quiz-wrapper">
        <section id="quiz-container" class="quiz-container"></section>

        <div class="button-group">
            <button id="submit-btn" class="action-button">Submit Quiz</button>
            <button id="restart-btn" class="action-button secondary">Restart Quiz</button>
        </div>

        <section id="result-card" class="result-card hidden">
            <h2>Quiz Results</h2>
            <div class="results-grid">
                <div class="result-item">
                    <span class="result-label">Correct Answers</span>
                    <strong id="correct-count">0</strong>
                </div>
                <div class="result-item">
                    <span class="result-label">Incorrect Answers</span>
                    <strong id="incorrect-count">0</strong>
                </div>
                <div class="result-item">
                    <span class="result-label">Score</span>
                    <strong id="final-score">0 / 10</strong>
                </div>
                <div class="result-item full-width">
                    <span class="result-label">Percentage</span>
                    <strong id="percentage-score">0%</strong>
                </div>
            </div>
            <p id="score-message" class="score-message"></p>
        </section>
    </main>

    <script src="Quiz.js"></script>
</body>
</html>
