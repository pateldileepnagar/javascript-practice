<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Practice</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>JavaScript Practice Exercises</h1>

    <!-- Exercise 1 -->
    <section>
        <h2>1. Change Paragraph Text</h2>
        <button onclick="changeText()">Click Me</button>
        <p id="para1">Original Text</p>
    </section>

    <!-- Exercise 5 -->
    <section>
        <h2>2. Change Background Color</h2>
        <button onclick="changeColor()">Change Background</button>
    </section>

    <!-- Exercise 6 -->
    <section>
        <h2>3. Display Input Text</h2>

        <input
            type="text"
            id="userInput"
            placeholder="Enter text">

        <button onclick="showText()">Show</button>

        <div id="output"></div>
    </section>

    <!-- Exercise 10 -->
    <section>
        <h2>4. Current Date & Time</h2>

        <button onclick="showDate()">
            Show Date & Time
        </button>

        <p id="date"></p>
    </section>

    <!-- Exercise 13 -->
    <section>
        <h2>5. Hide / Show Paragraph</h2>

        <button onclick="toggleParagraph()">
            Toggle Paragraph
        </button>

        <p id="togglePara">
            This paragraph can be hidden and shown.
        </p>
    </section>

    <!-- Exercise 11 -->
    <section>
        <h2>6. Fruits List</h2>

        <ul id="fruitList"></ul>
    </section>

    <script src="script.js"></script>

</body>
</html>
